<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Website Title name -->
    <title>Multiple Text Generator</title>
    <!-- Links to css file -->
    <link rel="stylesheet" href="style.css">
   <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=content_copy" />
</head>
<body>
    <!-- Top heading -->
    <h1>Magic Text Generator</h1>
    
    <!-- Top box/div -->
    <div class="upper-box">
        <!-- first div/box (input box)-->
        <div class="box" id="first">
            <!-- for input text -->
            <textarea id="input-text" placeholder="Enter your text here" required autofocus></textarea>
        </div>

        <!-- Second div/box (number of times box) -->
        <div class="box" id="second">
            <!-- for input number of times text -->
            <input type="number" id="times" placeholder="Enter the number of times" min="1" max="100" required>
        </div>

        <!-- Third div/box (Output-text box) -->
        <div class="box" id="third">
            <!-- Copy button -->
            <div id="copy-button">
                <span class="material-symbols-outlined">content_copy</span>
            </div>
            <!-- Displaying output text -->
            <p id="output-text"></p>
        </div>

    </div>

    <!-- Displaying text copied message -->
    <div id="toast">Copied</div>

    <!-- Footer section -->
    <footer>
    <p>© 2026 <span>Repeatify</span>. Made with ❤️ by Abdullah Atif.</p>
    </footer>
    <!-- Link to js file -->
    <script src="script.js"></script>
</body>
</html>
